<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naresh Pro Meet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Video - Poori Screen Par */
        #video-grid { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Movable Whiteboard Box */
        #whiteboard-container { 
            position: absolute; top: 50px; left: 20px;
            width: 320px; height: 280px; background: white; 
            border-radius: 12px; display: none; z-index: 200;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); touch-action: none;
        }
        .handle { 
            background: #3b82f6; height: 35px; border-radius: 12px 12px 0 0; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; color: white; cursor: move; font-weight: bold;
        }
        canvas { width: 100%; height: calc(100% - 35px); background: white; border-radius: 0 0 12px 12px; touch-action: none; }

        /* Floating Controls */
        .controls { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 20px; background: rgba(255,255,255,0.15); 
            padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.2); z-index: 100;
        }
        .btn { border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 28px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-call { background: #22c55e; box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .btn-board { background: #f59e0b; box-shadow: 0 0 15px rgba(245,158,11,0.4); }
        .btn-end { background: #ef4444; }
    </style>
</head>
<body>

<div id="video-grid"><video id="localVideo" autoplay muted playsinline></video></div>

<div id="whiteboard-container" id="draggable">
    <div class="handle" id="boardHandle">
        <span>BOARD ⠿</span>
        <span onclick="toggleBoard()" style="cursor:pointer; font-size: 20px;">×</span>
    </div>
    <canvas id="canvas"></canvas>
</div>

<div class="controls">
    <button class="btn btn-call" onclick="startCall()">📞</button>
    <button class="btn btn-board" onclick="toggleBoard()">✏️</button>
    <button class="btn btn-end" onclick="window.location.reload()">🛑</button>
</div>

<script>
    let myStream;
    const container = document.getElementById('whiteboard-container');
    const handle = document.getElementById('boardHandle');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    async function startCall() {
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
    }

    function toggleBoard() {
        container.style.display = (container.style.display === 'block') ? 'none' : 'block';
        if(container.style.display === 'block') {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';
        }
    }

    // Drag Logic for Mobile & PC
    let offset = [0,0];
    handle.addEventListener('touchstart', (e) => {
        offset = [container.offsetLeft - e.touches[0].clientX, container.offsetTop - e.touches[0].clientY];
    });
    handle.addEventListener('touchmove', (e) => {
        container.style.left = (e.touches[0].clientX + offset[0]) + 'px';
        container.style.top = (e.touches[0].clientY + offset[1]) + 'px';
    });

    // Drawing Logic
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; });
    canvas.addEventListener('touchmove', (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        ctx.stroke();
    });
</script>
</body>
</html>
