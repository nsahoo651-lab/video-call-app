<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naresh Pro Meet</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.1); --accent: #3b82f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Professional Header */
        header { background: var(--glass); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 1px solid var(--glass); }
        
        /* Grid for 6 People */
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        video { width: 100%; border-radius: 15px; background: #000; border: 2px solid var(--glass); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }

        /* Floating Controls */
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: var(--glass); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid var(--glass); z-index: 100; }
        .btn { border: none; padding: 12px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; }
        .btn-call { background: #22c55e; }
        .btn-end { background: #ef4444; }
        .btn-chat { background: #3b82f6; }
        .btn-draw { background: #f59e0b; }

        /* Chat Panel */
        #chat-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--bg); border-left: 1px solid var(--glass); transition: 0.3s; z-index: 200; padding: 20px; display: flex; flexDirection: column; }
        #chat-panel.active { right: 0; }
        #messages { flex: 1; overflow-y: auto; border-bottom: 1px solid var(--glass); padding-bottom: 10px; }
        
        /* Whiteboard Panel */
        #whiteboard { position: fixed; top: 10%; left: 10%; width: 80%; height: 70%; background: white; border-radius: 20px; display: none; z-index: 300; }
    </style>
</head>
<body>

<header>
    <h2>Naresh Pro Meet <span id="status" style="font-size: 12px; color: #22c55e;">● LIVE</span></h2>
</header>

<div id="video-grid">
    <video id="localVideo" autoplay muted playsinline></video>
</div>

<div class="controls">
    <button class="btn btn-call" id="joinBtn" onclick="startCall()">📞</button>
    <button class="btn btn-chat" onclick="toggleChat()">💬</button>
    <button class="btn btn-draw" onclick="toggleBoard()">✏️</button>
    <button class="btn btn-end" onclick="endCall()">🛑</button>
</div>

<div id="chat-panel">
    <h3>Group Chat</h3>
    <div id="messages"></div>
    <input type="text" id="chatInput" placeholder="Type message..." style="width: 80%; padding: 8px;">
    <input type="file" id="fileInput" style="display: none;" onchange="sendFile()">
    <button onclick="document.getElementById('fileInput').click()">📎</button>
</div>

<canvas id="whiteboard"></canvas>

<audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    let localStream;
    let peers = {};

    function toggleChat() { document.getElementById('chat-panel').classList.toggle('active'); }
    function toggleBoard() { 
        const board = document.getElementById('whiteboard');
        board.style.display = board.style.display === 'block' ? 'none' : 'block';
    }

    async function startCall() {
        document.getElementById('ringtone').play(); // Pehle ringtone bajegi
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        socket.emit('signal', { type: 'join', name: 'User' });
    }

    // Chat aur File logic yahan add hoga...
</script>
</body>
</html>
