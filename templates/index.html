<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naresh Pro Meet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(30%, 1fr)); gap: 5px; height: 100vh; width: 100vw; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; border-radius: 10px; }

        /* Slide-up Chat Panel */
        #chat-panel {
            position: fixed; bottom: -420px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 400px; height: 400px; background: white;
            border-radius: 20px 20px 0 0; transition: 0.4s ease; z-index: 500;
            display: flex; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #chat-panel.active { bottom: 0; }
        .chat-header { background: #0084ff; color: white; padding: 15px; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; cursor: pointer; }
        #chat-msgs { flex: 1; padding: 10px; overflow-y: auto; color: #333; }

        /* Media Share Box (Movable) */
        #media-box { 
            position: absolute; top: 60px; right: 20px; width: 220px; 
            background: #fff; border-radius: 10px; display: none; z-index: 300; padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); z-index: 100; }
        .btn { border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-call { background: #22c55e; }
        .btn-chat { background: #0084ff; }
        .btn-clip { background: #6b7280; }
        .btn-end { background: #ef4444; }
    </style>
</head>
<body>

<div id="video-grid"><video id="localVideo" autoplay muted playsinline></video></div>

<div id="chat-panel" id="chatPanel">
    <div class="chat-header" onclick="toggleChat()"><b>Group Chat</b><span>▼</span></div>
    <div id="chat-msgs"></div>
    <div style="padding:10px; border-top:1px solid #eee; display:flex;">
        <input type="text" id="chatInput" placeholder="Type here..." style="flex:1; padding:8px; border-radius:20px; border:1px solid #ddd; outline:none;">
        <button onclick="sendMsg()" style="border:none; background:none; font-size:20px; margin-left:5px;">🚀</button>
    </div>
</div>

<div id="media-box">
    <div style="text-align:right;"><span onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer; color:red;">×</span></div>
    <img id="mImg" style="width:100%; border-radius:5px;">
</div>

<div class="controls">
    <button class="btn btn-call" onclick="startCall()">📞</button>
    <button class="btn btn-chat" onclick="toggleChat()">💬</button>
    <input type="file" id="fInput" style="display:none" onchange="shareF(this)">
    <button class="btn btn-clip" onclick="document.getElementById('fInput').click()">📎</button>
    <button class="btn btn-end" onclick="window.location.reload()">🛑</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    function toggleChat() { document.getElementById('chat-panel').classList.toggle('active'); }

    async function startCall() {
        const s = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('localVideo').srcObject = s;
        socket.emit('join', {name: 'Naresh'});
    }

    function sendMsg() {
        const i = document.getElementById('chatInput');
        if(i.value) {
            document.getElementById('chat-msgs').innerHTML += `<p><b>Me:</b> ${i.value}</p>`;
            socket.emit('chat_message', {msg: i.value, user: 'Naresh'});
            i.value = '';
        }
    }

    socket.on('chat_message', (d) => {
        document.getElementById('chat-msgs').innerHTML += `<p><b>${d.user}:</b> ${d.msg}</p>`;
    });

    function shareF(input) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById('mImg').src = e.target.result;
            document.getElementById('media-box').style.display = 'block';
            socket.emit('media_share', {file: e.target.result});
        };
        r.readAsDataURL(input.files[0]);
    }

    socket.on('receive_media', (d) => {
        document.getElementById('mImg').src = d.file;
        document.getElementById('media-box').style.display = 'block';
    });
</script>
</body>
</html>
