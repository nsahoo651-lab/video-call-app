<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naresh Ultra Premium</title>
    <style>
        :root { --p: #0084ff; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        /* 6 PERSON SQUARE GRID */
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; padding: 15px; height: 100vh; align-content: start; }
        .v-box { position: relative; width: 100%; padding-top: 100%; background: #151515; border-radius: 20px; overflow: hidden; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .u-name { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 10px; font-size: 12px; }

        /* KEYBOARD FRIENDLY FLOATING CHAT */
        #chat-panel { 
            position: fixed; 
            bottom: -500px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 95%; 
            max-width: 400px; 
            height: 380px; /* Height thodi kam ki hai taaki keyboard fit ho sake */
            background: white; 
            border-radius: 25px; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 4000; 
            display: flex; 
            flex-direction: column; 
            color: #333;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        
        /* Jab Chat khulega toh ye buttons se 100px upar float karega */
        #chat-panel.active { 
            bottom: 100px; 
        }

        .chat-h { background: var(--p); color: white; padding: 20px; border-radius: 25px 25px 0 0; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }

        /* MOVABLE WINDOWS */
        #whiteboard-container, #media-box { position: absolute; top: 70px; left: 10px; width: 320px; height: 280px; background: white; border-radius: 20px; display: none; z-index: 1500; border: 3px solid var(--p); box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
        .handle { background: var(--p); height: 40px; border-radius: 15px 15px 0 0; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; cursor: move; }

        /* CONTROL BAR */
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: var(--glass); padding: 15px 25px; border-radius: 100px; backdrop-filter: blur(20px); z-index: 3000; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; background: #333; }
        .btn-mic.off { background: #ff4444; }
        .btn-call { background: #28a745; }
        .btn-end { background: #dc3545; }
        .btn:active { transform: scale(0.9); }
        
        /* Input Area Fix */
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #cIn { flex: 1; padding: 12px 18px; border-radius: 30px; border: 1px solid #ddd; background: #f0f2f5; outline: none; font-size: 16px; }
        .send-btn { background: var(--p); border: none; color: white; padding: 0 15px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="video-grid"><div class="v-box"><video id="localVideo" autoplay muted playsinline></video><div class="u-name">You</div></div></div>

<div id="chat-panel">
    <div class="chat-h" onclick="tChat()"><span>Messenger Chat</span><span>▼</span></div>
    <div id="cMsgs" style="flex:1; padding:15px; overflow-y:auto; display: flex; flex-direction: column; gap: 8px;"></div>
    <div class="input-area">
        <input id="cIn" placeholder="Aa" autocomplete="off">
        <button class="send-btn" onclick="sendM()">💙</button>
    </div>
</div>

<div id="whiteboard-container"><div class="handle"><span>Board</span><span onclick="tB()">✕</span></div><canvas id="canvas"></canvas></div>
<div id="media-box"><div style="text-align:right; padding:5px;"><span onclick="this.parentElement.parentElement.style.display='none'" style="color:red; font-size:20px; cursor:pointer;">✕</span></div><img id="mImg" style="width:100%; border-radius:10px; padding:10px;"></div>

<div class="controls">
    <button class="btn btn-call" id="startBtn" onclick="startCall()">📞</button>
    <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="btn" onclick="toggleSpeaker()">🔊</button> 
    <button class="btn" onclick="tChat()">💬</button>
    <button class="btn" onclick="tB()">✏️</button>
    <input type="file" id="fIn" style="display:none" onchange="sFile(this)">
    <button class="btn" onclick="document.getElementById('fIn').click()">📎</button>
    <button class="btn btn-end" onclick="location.reload()">🛑</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io(); const myId = Math.random().toString(36).substring(7);
    let myStream; const peers = {};

    function tChat() { document.getElementById('chat-panel').classList.toggle('active'); }
    function tB() { const b=document.getElementById('whiteboard-container'); b.style.display=(b.style.display==='block')?'none':'block'; if(b.style.display==='block') setupCanvas(); }

    async function startCall() {
        myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('localVideo').srcObject = myStream;
        socket.emit('join', {id:myId});
        document.getElementById('startBtn').style.background = "#666";
    }

    function toggleMic() {
        const audioTrack = myStream.getAudioTracks()[0];
        audioTrack.enabled = !audioTrack.enabled;
        document.getElementById('micBtn').classList.toggle('off');
        document.getElementById('micBtn').innerText = audioTrack.enabled ? '🎤' : '🔇';
    }

    async function toggleSpeaker() {
        alert("Audio routed to best available device (Headphones/Speaker)");
        const videos = document.querySelectorAll('video');
        videos.forEach(v => { if(v.setSinkId) v.setSinkId(""); });
    }

    socket.on('user-joined', async (d) => {
        const pc = createPC(d.id);
        myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
        const o = await pc.createOffer(); await pc.setLocalDescription(o);
        socket.emit('signal', {to:d.id, from:myId, signal:o});
    });

    socket.on('signal', async (d) => {
        if (d.to !== myId) return;
        let pc = peers[d.from] || createPC(d.from);
        if (d.signal.type==='offer') {
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
            const a = await pc.createAnswer(); await pc.setLocalDescription(a);
            socket.emit('signal', {to:d.from, from:myId, signal:a});
        } else if (d.signal.type==='answer') await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
        else if (d.signal.candidate) await pc.addIceCandidate(new RTCIceCandidate(d.signal.candidate));
    });

    function createPC(pId) {
        const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
        peers[pId] = pc;
        pc.onicecandidate = (e) => { if(e.candidate) socket.emit('signal',{to:pId, from:myId, signal:{candidate:e.candidate}}); };
        pc.ontrack = (e) => {
            if(!document.getElementById(pId)) {
                const div = document.createElement('div'); div.className='v-box';
                const v = document.createElement('video'); v.id=pId; v.autoplay=true; v.playsinline=true; v.srcObject=e.streams[0];
                div.appendChild(v); document.getElementById('video-grid').appendChild(div);
            }
        };
        return pc;
    }

    function sendM() { 
        const i=document.getElementById('cIn'); 
        if(i.value){ 
            document.getElementById('cMsgs').innerHTML+=`<div style="align-self: flex-end; background: #0084ff; color: white; padding: 8px 15px; border-radius: 15px;">${i.value}</div>`; 
            socket.emit('chat_message',{msg:i.value, user:'Naresh'}); 
            i.value=''; 
        } 
    }
    socket.on('chat_message', (d)=>{ 
        document.getElementById('cMsgs').innerHTML+=`<div style="align-self: flex-start; background: #eee; color: #333; padding: 8px 15px; border-radius: 15px;"><b>${d.user}:</b> ${d.msg}</div>`; 
    });
    
    function sFile(input) { const r=new FileReader(); r.onload=(e)=>{ document.getElementById('mImg').src=e.target.result; document.getElementById('media-box').style.display='block'; socket.emit('media_share',{file:e.target.result}); }; r.readAsDataURL(input.files[0]); }
    socket.on('receive_media', (d)=>{ document.getElementById('mImg').src=d.file; document.getElementById('media-box').style.display='block'; });

    function setupCanvas() { const c=document.getElementById('canvas'); const ctx=c.getContext('2d'); c.width=c.offsetWidth; c.height=c.offsetHeight; ctx.lineWidth=3; ctx.strokeStyle='#000'; let d=false; c.onmousedown=()=>{d=true;}; c.onmouseup=()=>{d=false; ctx.beginPath();}; c.onmousemove=(e)=>{ if(!d)return; const r=c.getBoundingClientRect(); ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke(); }; }
</script>
</body>
</html>
