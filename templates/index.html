<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naresh Pro Group Meet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* SQUARE SIDE-BY-SIDE GRID */
        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; padding: 10px; height: 100vh; width: 100vw; 
            align-content: start;
        }

        .v-box {
            position: relative; width: 100%; padding-top: 100%; /* Square Shape */
            background: #1a1a1a; border-radius: 15px; overflow: hidden; border: 2px solid #333;
        }

        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(10px); z-index: 1000; }
        .btn { border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-call { background: #22c55e; } .btn-end { background: #ef4444; }
    </style>
</head>
<body>

<div id="video-grid">
    <div class="v-box"><video id="localVideo" autoplay muted playsinline></video></div>
</div>

<div class="controls">
    <button class="btn btn-call" onclick="startCall()">📞</button>
    <button class="btn btn-end" onclick="window.location.reload()">🛑</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const myId = Math.random().toString(36).substring(7);
    let myStream;
    const peers = {};

    async function startCall() {
        // Microphone aur Camera dono on karega
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        socket.emit('join', { id: myId });
    }

    socket.on('user-joined', async (data) => {
        const pc = createPeerConnection(data.id);
        myStream.getTracks().forEach(track => pc.addTrack(track, myStream));
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { to: data.id, from: myId, signal: offer });
    });

    socket.on('signal', async (data) => {
        if (data.to !== myId) return;
        let pc = peers[data.from] || createPeerConnection(data.from);
        if (data.signal.type === 'offer') {
            myStream.getTracks().forEach(track => pc.addTrack(track, myStream));
            await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { to: data.from, from: myId, signal: answer });
        } else if (data.signal.type === 'answer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
        } else if (data.signal.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
        }
    });

    function createPeerConnection(pId) {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        peers[pId] = pc;
        pc.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', { to: pId, from: myId, signal: { candidate: e.candidate } }); };
        pc.ontrack = (e) => {
            if (!document.getElementById(pId)) {
                const div = document.createElement('div'); div.className = 'v-box';
                const v = document.createElement('video'); v.id = pId; v.autoplay = true; v.playsinline = true;
                v.srcObject = e.streams[0]; // Ye line awaaz aur video dono legi
                div.appendChild(v);
                document.getElementById('video-grid').appendChild(div);
            }
        };
        return pc;
    }
</script>
</body>
</html>
