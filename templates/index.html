<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    let localStream;

    // 1. Camera Shuru karne ka function
    async function startCall() {
        try {
            console.log("Starting call...");
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            alert("Camera chalu ho gaya hai!");
        } catch (e) {
            console.error(e);
            alert("Permission denied! Setting mein jaakar Camera allow karein.");
        }
    }

    // 2. Chat toggle karne ka function
    function toggleChat() {
        alert("Chat Feature jald hi activate hoga! Abhi hum sirf video check kar rahe hain.");
    }

    // 3. Call khatam karne ka function
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            document.getElementById('localVideo').srcObject = null;
        }
        window.location.reload(); // Page refresh karke sab reset karein
    }
</script>
