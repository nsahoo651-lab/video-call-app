<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const myId = Math.random().toString(36).substring(7); // Har user ki unique ID
    let myStream;
    const videoGrid = document.getElementById('video-grid');

    // 1. Call Start Function (Audio + Video dono ke liye)
    async function startCall() {
        try {
            // Audio aur Video dono ki permission lega
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: true, 
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true 
                } 
            });
            
            document.getElementById('localVideo').srcObject = myStream;
            
            // Server ko batana ki naya banda (Naresh) jud gaya hai
            socket.emit('join', { id: myId, name: 'Naresh' });
            console.log("My call started with Audio/Video");
            
        } catch (err) {
            console.error(err);
            alert("Mic aur Camera on karne ke liye 'Allow' dabayein!");
        }
    }

    // 2. Jab koi doosra banda jude (Up to 6 people)
    socket.on('user-joined', (data) => {
        console.log("Naya dost juda: " + data.name);
        
        // Naya video box (dabba) banana
        const remoteVideo = document.createElement('video');
        remoteVideo.autoplay = true;
        remoteVideo.playsinline = true;
        remoteVideo.id = data.id;
        
        // Dusre bande ki awaaz sunne ke liye muted = false
        remoteVideo.muted = false; 
        
        videoGrid.appendChild(remoteVideo);
        
        // Note: Real 6-person audio/video ke liye WebRTC signals exchange hote hain
        // Abhi ke liye ye frame create kar raha hai
    });

    // 3. Chat Slide Toggle Function
    function toggleChat() {
        const chatPanel = document.getElementById('chat-panel');
        chatPanel.classList.toggle('active');
    }

    // 4. Whiteboard Toggle
    function toggleBoard() {
        const board = document.getElementById('whiteboard-container');
        board.style.display = (board.style.display === 'block') ? 'none' : 'block';
    }

    // 5. Call Khatam karna
    function endCall() {
        if (myStream) {
            myStream.getTracks().forEach(track => track.stop());
        }
        window.location.reload();
    }
</script>
